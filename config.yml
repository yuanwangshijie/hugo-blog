# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://blog.qiang.uk/"
title: 远望世界' Blog
copyright: "© [远望世界](https://blog.qiang.uk/)"
paginate: 6
theme: [ hugo-PaperMod ]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: [ "posts" ]
defaultContentLanguage: "zh"
hasCJKLanguage: true # 是否包括中日韩文字

Permalinks:
  posts: "/:year/:month/:day/:title/"

minify:
  disableXML: true
  # minifyOutput: true

languages:
  zh:
    languageName: "简体中文"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: 主页
          url: posts
          weight: 1
        - name: 搜索
          url: search
          weight: 2
        - name: 分类
          url: categories
          weight: 3
        - name: 标签
          url: tags
          weight: 4
        - name: 归档
          url: archives
          weight: 5
        - name: 随记
          url: https://memo.qiang.uk/
          weight: 6

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: ""
  author: 远望世界
  # author: ["Me", "You"] # multiple authors
  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: true
  images: [ "/icons/avatar.png" ]

  profileMode:
    enabled: true
    title: 远望世界
    imageUrl: "/icons/avatar.png"
    imageTitle: 远望世界
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: 主页
        url: posts
      - name: 随记
        url: https://memo.qiang.uk/

  homeInfoParams:
    Title: "远望世界"
    Content: 欢迎光临，这是我的个人博客。

  socialIcons:
    - name: Github
      title: Github
      url: "https://github.com/yuanwangshijie"
    - name: X
      title: X
      url: "https://x.com/yuanwangshijie"

  editPost:
    URL: "https://github.com/yuanwangshijie/hugo-blog/tree/main/content"
    Text: "编辑此页" # edit text
    appendFilePath: true # to append file path to Edit link

  #  label:
  #    iconSVG: ''
  #    text: "远望世界' Blog123"
  #    icon: ""
  #    iconHeight: 35

  #  analytics:
  #    google:
  #      SiteVerificationTag: "XYZabc"

  assets:
    disableHLJS: false
    favicon: "/icons/favicon.ico"
    favicon16x16: "/icons/favicon-16x16.png"
    favicon32x32: "/icons/favicon-32x32.png"
    apple_touch_icon: "/icons/fapple-touch-icon.png"
    safari_pinned_tab: "/icons/safari-pinned-tab.svg"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # fuseOpts:
  #     isCaseSensitive: false
  #     shouldSort: true
  #     location: 0
  #     distance: 1000
  #     threshold: 0.4
  #     minMatchCharLength: 0
  #     keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai

